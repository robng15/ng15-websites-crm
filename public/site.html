<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site — NG15 Websites CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="app-page">

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <a href="/" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </a>
        <div class="brand-icon">W</div>
        <span class="brand-name" id="page-title">Add Site</span>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" id="logout-btn">Sign out</button>
      </div>
    </div>
  </header>

  <main class="form-main">
    <div id="alert" class="alert" hidden></div>

    <form id="site-form" novalidate>

      <!-- Section: Client Information -->
      <section class="form-section">
        <h2 class="section-title">Client Information</h2>
        <div class="form-grid">

          <div class="field-group">
            <label>Ref No</label>
            <input type="text" id="ref_no" readonly placeholder="Auto-generated">
          </div>

          <div class="field-group">
            <label for="client_company_name">Client Company Name <span class="req">*</span></label>
            <input type="text" id="client_company_name" name="client_company_name" required>
          </div>

          <div class="field-group">
            <label for="site_url">Site URL</label>
            <input type="text" id="site_url" name="site_url" placeholder="www.example.co.uk">
          </div>

          <div class="field-group field-group--full">
            <label>Logo</label>
            <div class="logo-upload-wrap">
              <div id="logo-preview" class="logo-preview" hidden>
                <img id="logo-img" src="" alt="Logo">
                <button type="button" class="logo-remove" id="logo-remove" title="Remove logo">&times;</button>
              </div>
              <label class="btn btn-ghost logo-btn" id="logo-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                Upload Logo
                <input type="file" id="logo-file" accept=".jpg,.jpeg,.png,.gif,.svg,.webp" hidden>
              </label>
              <span id="logo-upload-status" class="upload-status"></span>
              <input type="hidden" id="logo" name="logo">
            </div>
          </div>

        </div>
      </section>

      <!-- Section: Contacts -->
      <section class="form-section">
        <h2 class="section-title">Contacts</h2>
        <div class="form-grid">

          <div class="field-group">
            <label for="contact_names">Contact Name(s)</label>
            <textarea id="contact_names" name="contact_names" rows="3" placeholder="One per line&#10;e.g. Chris Turner"></textarea>
          </div>

          <div class="field-group">
            <label for="contact_emails">Contact Email(s)</label>
            <textarea id="contact_emails" name="contact_emails" rows="3" placeholder="One per line&#10;e.g. chris@example.co.uk"></textarea>
          </div>

        </div>
      </section>

      <!-- Section: Server & Status -->
      <section class="form-section">
        <h2 class="section-title">Server &amp; Status</h2>
        <div class="form-grid">

          <div class="field-group">
            <label>Live Server</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="live_server" value="Technicks"> Technicks</label>
              <label class="radio-label"><input type="radio" name="live_server" value="Fasthosts VPS"> Fasthosts VPS</label>
              <label class="radio-label"><input type="radio" name="live_server" value="Other"> Other</label>
            </div>
            <input type="text" class="notes-field" id="live_server_notes" name="live_server_notes" placeholder="Details…" hidden>
          </div>

          <div class="field-group">
            <label>Site Status</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="site_status" value="Complete &amp; Live"> Complete &amp; Live</label>
              <label class="radio-label"><input type="radio" name="site_status" value="In Development"> In Development</label>
              <label class="radio-label"><input type="radio" name="site_status" value="Holding Page"> Holding Page</label>
              <label class="radio-label"><input type="radio" name="site_status" value="Other"> Other</label>
            </div>
            <input type="text" class="notes-field" id="site_status_notes" name="site_status_notes" placeholder="Details…" hidden>
          </div>

          <div class="field-group">
            <label for="staging_url">Staging URL</label>
            <input type="text" id="staging_url" name="staging_url" placeholder="example.ng15staging.uk">
          </div>

          <div class="field-group">
            <label>Staging Server</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="staging_server" value="N/A"> N/A</label>
              <label class="radio-label"><input type="radio" name="staging_server" value="Fasthosts VPS"> Fasthosts VPS</label>
            </div>
          </div>

        </div>
      </section>

      <!-- Section: DNS -->
      <section class="form-section">
        <h2 class="section-title">DNS</h2>
        <div class="form-grid">

          <div class="field-group">
            <label>DNS Location</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="dns_location" value="ng15"> ng15</label>
              <label class="radio-label"><input type="radio" name="dns_location" value="external"> External</label>
            </div>
          </div>

          <div class="field-group">
            <label>DNS Details</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="dns_details" value="Fasthosts (ng15)"> Fasthosts (ng15)</label>
              <label class="radio-label"><input type="radio" name="dns_details" value="external contact"> External contact</label>
            </div>
            <input type="text" class="notes-field" id="dns_details_notes" name="dns_details_notes" placeholder="Contact details…" hidden>
          </div>

        </div>
      </section>

      <!-- Section: Technical -->
      <section class="form-section">
        <h2 class="section-title">Technical</h2>
        <div class="form-grid">

          <div class="field-group">
            <label>Site Type</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="site_type" value="Wordpress (Brochure Site)"> Wordpress (Brochure Site)</label>
              <label class="radio-label"><input type="radio" name="site_type" value="Wordpress (ePim Site)"> Wordpress (ePim Site)</label>
              <label class="radio-label"><input type="radio" name="site_type" value="Other"> Other</label>
            </div>
            <input type="text" class="notes-field" id="site_type_notes" name="site_type_notes" placeholder="Details…" hidden>
          </div>

          <div class="field-group">
            <label>Data Type</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="data_type" value="N/A"> N/A</label>
              <label class="radio-label"><input type="radio" name="data_type" value="ePim Connector (Legacy)"> ePim Connector (Legacy)</label>
              <label class="radio-label"><input type="radio" name="data_type" value="ePim Connector (inHouse)"> ePim Connector (inHouse)</label>
              <label class="radio-label"><input type="radio" name="data_type" value="Spreadsheet Import"> Spreadsheet Import</label>
            </div>
          </div>

          <div class="field-group">
            <label>Site Build</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="site_build" value="Divi 4"> Divi 4</label>
              <label class="radio-label"><input type="radio" name="site_build" value="Divi 5"> Divi 5</label>
              <label class="radio-label"><input type="radio" name="site_build" value="Elementor"> Elementor</label>
              <label class="radio-label"><input type="radio" name="site_build" value="Other"> Other</label>
            </div>
            <input type="text" class="notes-field" id="site_build_notes" name="site_build_notes" placeholder="Details…" hidden>
          </div>

          <div class="field-group">
            <label>Plugins</label>
            <div class="checkbox-group" id="plugins-group">
              <label class="checkbox-label"><input type="checkbox" name="plugins" value="WooCommerce"> WooCommerce</label>
              <label class="checkbox-label"><input type="checkbox" name="plugins" value="DiviExtras"> DiviExtras</label>
              <label class="checkbox-label"><input type="checkbox" name="plugins" value="Store Locator"> Store Locator</label>
              <label class="checkbox-label"><input type="checkbox" name="plugins" value="Tier Pricing"> Tier Pricing</label>
              <label class="checkbox-label"><input type="checkbox" name="plugins" value="BodyCommerce"> BodyCommerce</label>
              <label class="checkbox-label"><input type="checkbox" name="plugins" value="Mega-Menu"> Mega-Menu</label>
              <label class="checkbox-label"><input type="checkbox" name="plugins" value="WP Caching"> WP Caching</label>
              <label class="checkbox-label"><input type="checkbox" id="plugins-other-check" value="Other"> Other</label>
            </div>
            <input type="text" class="notes-field" id="plugins_other" name="plugins_other" placeholder="Other plugin(s)…" hidden>
          </div>

        </div>
      </section>

      <!-- Section: Dates -->
      <section class="form-section">
        <h2 class="section-title">Dates</h2>
        <div class="form-grid">

          <div class="field-group">
            <label for="project_start_date">Project Start Date</label>
            <input type="date" id="project_start_date" name="project_start_date">
          </div>

          <div class="field-group">
            <label for="website_live_date">Website Live Date</label>
            <input type="date" id="website_live_date" name="website_live_date">
          </div>

          <div class="field-group">
            <label>Date Added</label>
            <input type="text" id="created_at" readonly>
          </div>

          <div class="field-group">
            <label>Last Modified</label>
            <input type="text" id="updated_at" readonly>
          </div>

        </div>
      </section>

      <!-- Section: Notes -->
      <section class="form-section">
        <h2 class="section-title">Notes</h2>
        <div class="form-grid">

          <div class="field-group">
            <label for="other_site_config">Other Site Config</label>
            <input type="text" id="other_site_config" name="other_site_config" placeholder="e.g. SendGrid">
          </div>

          <div class="field-group field-group--full">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="5" placeholder="Additional notes…"></textarea>
          </div>

        </div>
      </section>

      <!-- Form actions -->
      <div class="form-actions">
        <a href="/" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary" id="submit-btn">Save Site</button>
      </div>

    </form>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/form.js"></script>
</body>
</html>
