<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NG15 Websites — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">W</div>
      <h1>Websites CRM</h1>
      <p>NG15 Project Tracker</p>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="field-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div id="error" class="alert alert-error" hidden></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign in</button>
    </form>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
